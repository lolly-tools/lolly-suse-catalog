<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><rect width="478" height="338" x="401" y="191" fill="none" stroke="#d4d4d8" stroke-width="2" rx="15" ry="15"/><text x="556.55" y="300" fill="#18181b" dominant-baseline="text-before-edge" font-family="-apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, Roboto, sans-serif" font-size="22" font-weight="650">Compress a PDF</text><g fill="#52525b" dominant-baseline="text-before-edge" font-family="-apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, Roboto, sans-serif" font-size="14" font-weight="400"><text x="440.03" y="340">Drag a PDF anywhere onto this area, or choose one below. We</text><text x="441.45" y="361">recompress its images — bulky photos and scans — and hand</text><text x="579.92" y="382">back a smaller file.</text></g><text x="459.11" y="471" fill="#71717a" dominant-baseline="text-before-edge" font-family="-apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, Roboto, sans-serif" font-size="12" font-weight="400">Everything happens in your browser. Your file is never uploaded.</text><text x="587.53" y="429" fill="#fff" dominant-baseline="text-before-edge" font-family="-apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, Roboto, sans-serif" font-size="14" font-weight="600">Choose a PDF…</text></svg>